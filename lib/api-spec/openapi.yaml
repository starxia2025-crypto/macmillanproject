openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HelpDesk Pro API - Multitenant support platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: tenants
    description: Tenant/client management
  - name: users
    description: User management
  - name: tickets
    description: Ticket management
  - name: comments
    description: Ticket comments
  - name: documents
    description: Document portal
  - name: dashboard
    description: Dashboard and statistics
  - name: audit
    description: Audit logs
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of tenants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get tenant by ID
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update tenant
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: role
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: assignedToId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated list of tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new ticket
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{ticketId}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket by ID
      security:
        - cookieAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update ticket
      security:
        - cookieAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketRequest"
      responses:
        "200":
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{ticketId}/assign:
    post:
      operationId: assignTicket
      tags: [tickets]
      summary: Assign ticket to technician
      security:
        - cookieAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTicketRequest"
      responses:
        "200":
          description: Ticket assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{ticketId}/status:
    post:
      operationId: changeTicketStatus
      tags: [tickets]
      summary: Change ticket status
      security:
        - cookieAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeStatusRequest"
      responses:
        "200":
          description: Status changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{ticketId}/comments:
    get:
      operationId: listTicketComments
      tags: [comments]
      summary: List ticket comments
      security:
        - cookieAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: addTicketComment
      tags: [comments]
      summary: Add comment to ticket
      security:
        - cookieAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated documents list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create document
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentRequest"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{documentId}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      security:
        - cookieAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document
      security:
        - cookieAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentRequest"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      security:
        - cookieAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/tickets-by-status:
    get:
      operationId: getTicketsByStatus
      tags: [dashboard]
      summary: Get tickets grouped by status
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Tickets by status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /dashboard/tickets-by-priority:
    get:
      operationId: getTicketsByPriority
      tags: [dashboard]
      summary: Get tickets grouped by priority
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Tickets by priority
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriorityCount"

  /dashboard/tickets-over-time:
    get:
      operationId: getTicketsOverTime
      tags: [dashboard]
      summary: Get ticket volume over time
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: month
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Tickets over time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSeriesPoint"

  /dashboard/tickets-by-technician:
    get:
      operationId: getTicketsByTechnician
      tags: [dashboard]
      summary: Get tickets grouped by assigned technician
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Tickets by technician
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TechnicianCount"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/top-categories:
    get:
      operationId: getTopCategories
      tags: [dashboard]
      summary: Get most frequent ticket categories
      security:
        - cookieAuth: []
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - email
        - password

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        tenantId:
          type: integer
          nullable: true
        tenantName:
          type: string
          nullable: true
        tenantSlug:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - active
        - createdAt

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        tenantId:
          type: integer
          nullable: true
        tenantName:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - email
        - name
        - role
        - active
        - createdAt

    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [superadmin, admin_cliente, tecnico, usuario_cliente, visor_cliente]
        tenantId:
          type: integer
          nullable: true
        password:
          type: string
          minLength: 8
      required:
        - email
        - name
        - role
        - password

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [superadmin, admin_cliente, tecnico, usuario_cliente, visor_cliente]
        active:
          type: boolean
        tenantId:
          type: integer
          nullable: true

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - data
        - total
        - page
        - limit
        - totalPages

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        active:
          type: boolean
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        totalUsers:
          type: integer
        totalTickets:
          type: integer
        openTickets:
          type: integer
      required:
        - id
        - name
        - slug
        - active
        - createdAt
        - totalUsers
        - totalTickets
        - openTickets

    CreateTenantRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        contactEmail:
          type: string
          format: email
          nullable: true
        primaryColor:
          type: string
          nullable: true
      required:
        - name
        - slug

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
        contactEmail:
          type: string
          nullable: true
        active:
          type: boolean
        primaryColor:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true

    TenantListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - data
        - total
        - page
        - limit
        - totalPages

    Ticket:
      type: object
      properties:
        id:
          type: integer
        ticketNumber:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [nuevo, pendiente, en_revision, en_proceso, esperando_cliente, resuelto, cerrado]
        priority:
          type: string
          enum: [baja, media, alta, urgente]
        category:
          type: string
          nullable: true
        tenantId:
          type: integer
        tenantName:
          type: string
        createdById:
          type: integer
        createdByName:
          type: string
        assignedToId:
          type: integer
          nullable: true
        assignedToName:
          type: string
          nullable: true
        customFields:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        commentCount:
          type: integer
      required:
        - id
        - ticketNumber
        - title
        - description
        - status
        - priority
        - tenantId
        - tenantName
        - createdById
        - createdByName
        - createdAt
        - updatedAt
        - commentCount

    TicketDetail:
      allOf:
        - $ref: "#/components/schemas/Ticket"
        - type: object
          properties:
            comments:
              type: array
              items:
                $ref: "#/components/schemas/Comment"
            auditLogs:
              type: array
              items:
                $ref: "#/components/schemas/AuditLog"

    CreateTicketRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
        description:
          type: string
          minLength: 10
        priority:
          type: string
          enum: [baja, media, alta, urgente]
          default: media
        category:
          type: string
          nullable: true
        tenantId:
          type: integer
        customFields:
          type: object
          nullable: true
      required:
        - title
        - description
        - tenantId

    UpdateTicketRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [baja, media, alta, urgente]
        category:
          type: string
          nullable: true
        customFields:
          type: object
          nullable: true

    AssignTicketRequest:
      type: object
      properties:
        userId:
          type: integer
          nullable: true
      required:
        - userId

    ChangeStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [nuevo, pendiente, en_revision, en_proceso, esperando_cliente, resuelto, cerrado]
        comment:
          type: string
          nullable: true
      required:
        - status

    TicketListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - data
        - total
        - page
        - limit
        - totalPages

    Comment:
      type: object
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        authorId:
          type: integer
        authorName:
          type: string
        authorRole:
          type: string
        content:
          type: string
        isInternal:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ticketId
        - authorId
        - authorName
        - authorRole
        - content
        - isInternal
        - createdAt

    CreateCommentRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
        isInternal:
          type: boolean
          default: false
      required:
        - content

    Document:
