kind = "web"
previewPath = "/"
title = "HelpDesk Pro"
version = "1.0.0"
id = "artifacts/helpdesk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21622

[services.development]
run = "pnpm --filter @workspace/helpdesk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/helpdesk", "run", "build" ]
publicDir = "artifacts/helpdesk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21622"
BASE_PATH = "/"
